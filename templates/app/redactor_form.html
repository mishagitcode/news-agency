{% extends "base.html" %}
{% block title %}Update redactor | News Agency{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card app-card form-card">
      <div class="card-body p-4 p-lg-5">
        <span class="eyebrow">Redactor</span>
        <h1 class="h3 mb-3">Update redactor</h1>

        <form method="post" class="app-form">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-outline-dark" href="{% url 'app:redactor-detail' redactor.id %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
