{% extends "base.html" %}
{% block title %}Dashboard | News Agency{% endblock %}

{% block content %}
<div class="row g-3">
  <div class="col-12 col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div class="text-muted small">Topics</div>
        <div class="display-6 fw-semibold">{{ num_topics }}</div>
        <a class="btn btn-sm btn-primary mt-2" href="{% url 'app:topic-list' %}">Browse</a>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div class="text-muted small">Newspapers</div>
        <div class="display-6 fw-semibold">{{ num_newspapers }}</div>
        <a class="btn btn-sm btn-primary mt-2" href="{% url 'app:newspaper-list' %}">Browse</a>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div class="text-muted small">Redactors</div>
        <div class="display-6 fw-semibold">{{ num_redactors }}</div>
        <a class="btn btn-sm btn-primary mt-2" href="{% url 'app:redactor-list' %}">Browse</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
