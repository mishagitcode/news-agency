{% extends "base.html" %}

{% block content %}
<h2>Topics</h2>

<ul>
  {% for topic in topic_list %}
    <li>
      {{ topic.name }}
      ({{ topic.newspapers_count }} newspapers)
    </li>
  {% empty %}
    <li>No topics yet.</li>
  {% endfor %}
</ul>

{% include "includes/pagination.html" %}
{% endblock %}
