{% extends "base.html" %}
{% block title %}Register | News Agency{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-6 col-xl-5">
    <div class="card app-card auth-card">
      <div class="card-body p-4 p-lg-5">
        <span class="eyebrow">Join the desk</span>
        <h1 class="h3 mb-3">Register</h1>
        <p class="page-subtitle mb-4">Create a redactor account and start working in the editorial workspace.</p>

        <form method="post" class="app-form">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="d-grid gap-2 d-md-flex">
            <button class="btn btn-primary" type="submit">Create account</button>
            <a class="btn btn-outline-dark" href="{% url 'login' %}">Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
