<nav class="navbar navbar-expand-lg app-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex flex-column gap-0" href="{% url 'app:index' %}">
      <span class="brand-mark">News Agency</span>
      <span class="brand-subtitle">Daily editorial workspace</span>
    </a>

    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 nav-pills-gap">
        <li class="nav-item"><a class="nav-link" href="{% url 'app:index' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'app:newspaper-list' %}">Newspapers</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'app:topic-list' %}">Topics</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'app:redactor-list' %}">Redactors</a></li>
      </ul>

      <div class="d-flex align-items-center gap-2 nav-actions">
        {% if user.is_authenticated %}
          <span class="navbar-text user-chip">
            {{ user.get_username }}
          </span>

          <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">
            <button class="btn btn-outline-light btn-sm px-3" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="btn btn-outline-light btn-sm px-3" href="{% url 'app:register' %}">Register</a>
          <a class="btn btn-primary btn-sm px-3" href="{% url 'login' %}?next={{ request.path }}">Login</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
